name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java (required by Gradle / Android SDK) ───────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dependencies ──────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Web build ─────────────────────────────────────────────────────────
      - name: Build web assets (Vite)
        run: npm run build

      # ── 7. Capacitor sync ────────────────────────────────────────────────────
      - name: Sync Capacitor to Android
        run: npx cap sync android

      # ── 8. Grant Gradle execute permission ───────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 9. Build APK ─────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 10. Upload artifact ──────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recicla-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ APK Build concluído!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "**APK gerado:** \`app-debug.apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 📥 Baixe o APK em **Actions → este run → Artifacts**" >> $GITHUB_STEP_SUMMARY
          fi
